<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Day of the Week Calculator</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f4f5f7;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
  }
  .card {
    background: white;
    padding: 2.5rem;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    text-align: center;
    width: 320px;
  }
  h1 {
    font-size: 1.3rem;
    margin-bottom: 1.5rem;
    color: #222;
  }
  input[type="date"] {
    width: 100%;
    padding: 0.7rem;
    font-size: 1rem;
    border-radius: 8px;
    border: 1px solid #ccc;
    margin-bottom: 1.2rem;
    box-sizing: border-box;
  }
  button {
    background: #d97757;
    color: white;
    border: none;
    padding: 0.7rem 1.5rem;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
    width: 100%;
  }
  button:hover {
    background: #c2643f;
  }
  #result {
    margin-top: 1.5rem;
    font-size: 1.4rem;
    font-weight: 600;
    color: #222;
    min-height: 2rem;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>What day does this date fall on?</h1>
    <input type="date" id="dateInput" value="2050-06-20">
    <button onclick="calculate()">Find the Day</button>
    <div id="result"></div>
  </div>

<script>
function calculate() {
  const val = document.getElementById('dateInput').value;
  if (!val) return;
  // Parse manually to avoid timezone shifting the date
  const [year, month, day] = val.split('-').map(Number);
  const dateObj = new Date(year, month - 1, day);
  const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const dayName = days[dateObj.getDay()];
  const formatted = dateObj.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  document.getElementById('result').textContent = formatted + " is a " + dayName;
}
calculate();
</script>
</body>
</html>
